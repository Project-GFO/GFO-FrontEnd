<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFO, 우리들의 커뮤니티</title>
    <link rel="stylesheet" href="pages/LogInPage.css">
</head>
<body>
    <div id="background"></div>
        <div id="page"> 
            <form class="box" id="login-form">
                <h2 id="login-sub">Login to GFO</h1><br>
                <input class="input" id="email" type="text" placeholder="이메일을 입력해주세요."><br>
                <input class="input" id="password" type="password" placeholder="비밀번호를 입력해주세요."><br>
                <a href="#" id="forgot-pw">Forgot Password?</a><br>
                <input class="submit" id="Log-in" type="submit" value="Log in"/><br>
            </form>
            <form class="box" id="signup-form">
                <h2 id="signup-sub">Create Account</h1><br>
                <input required class="input" id="name" type="text" placeholder="이름을 입력해주세요."><br>
                <input required class="input" id="email" type="text" placeholder="이메일을 입력해주세요."><br>
                <input required class="input" id="password" type="password" placeholder="비밀번호를 입력해주세요."><br>
                <input required class="input" id="password" type="password" placeholder="비밀번호를 다시 입력해주세요."><br>
                <input class="submit" id="SignIn" type="submit" value="Sign in" /><br>
            </form>
        <div class="box" id="change-form">
            <div id="change-sub">Welcome to GFO </div>
            <div id="change-content">Enter your personal details and<br>
                start journey with us</div>
            <button type="button" id="form-change-button">Sign up</button>
        </div>
    </div>  
    <div class="circle"></div>
    <div id="polygon"></div>
</body>
<script src="LogInPage.js"></script>
</html>
