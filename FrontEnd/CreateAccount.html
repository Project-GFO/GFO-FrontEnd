<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFO, 우리들의 커뮤니티</title>
    <link rel="stylesheet" href="CreateAccount.css">
</head>
<body>
    <div id="page1">
        <div id="photo-background"></div>
        <div id="photo"></div>
        <div id="photo-text1">GSM에게 열린 포럼, GFO</div>
        <div id="photo-text2"><br>지금 당장 질문하러</div>
        <div id="photo-text3"><br>가볼까요?</div>
    </div>
    <div id="page2">
        <div id="main">
            <form class="box" id="Welcome">
                <h1 id="Welcome-back">Welcome To GFO</h1>
                <input class="input" id="name" type="text" placeholder="이름을 입력해주세요."><br>
                <input class="input" id="email" type="text" placeholder="이메일을 입력해주세요."><br>
                <input class="input" id="password" type="text" placeholder="비밀번호를 입력해주세요."><br>
                <input class="input" id="password-again" type="tedxt" placeholder="비밀번호를 다시 입력해주세요.">
                <div >
                    <a href="#"><button type="button" id="CreateAccount-button">회원가입</button></a>
                </div>
                <span id="already-login">계정이 있으신가요?</span>
                <a href="LogInPage.html" id="Login">로그인</a>
            </form>
        </div>
    </div>
</body>
</html>
