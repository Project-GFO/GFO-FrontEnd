<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFO, 우리들의 커뮤니티</title>
    <link rel="stylesheet" href="pages/forgotpassword.css">
</head>
<body>
    <div id="background">
            <div id="photo"></div>
            <div id="page">
                <form class="box" id="forgot-pw" onsubmit="sending(event)">
                    <h2 id="forgot">Forgot Password?</h2>
                    <div id="warring">등록때 사용했던 이메일로 인증을 통해 비밀번호를 바꿀 수 있습니다. </div>
                    <input class="input" id="email" type="text" placeholder="이메일을 입력해주세요.">
                    <div id="rw-email">이메일을 다시 입력해주세요.</div>
                    <div>
                       <input type="submit" id="spend" value="인증번호 전송">
                    </div>
                </form>
                <div id="box">
                    <div id="confirm-box"></div>
                    <input id="confirm-button" type="button">
                    <div id="focus-box"></div>
                </div>
            </div>
           </div>
</body>
<script src="js/forgotpassword.js"></script>
</html>
